<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>いま空</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05060a; }
  body { font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif; color: #fff;
         -webkit-font-smoothing: antialiased; }

  #stage { display: flex; width: 100vw; height: 100vh; }
  .panel { position: relative; flex: 1; overflow: hidden;
           transition: background 1.4s cubic-bezier(.4,0,.2,1); }
  .panel + .panel { box-shadow: -1px 0 0 rgba(255,255,255,0.14); }
  /* 1都市モード: 右パネルを隠して左を全画面に */
  #stage.single .panel[data-i="1"] { display: none; }

  /* 上部: 都市セレクト */
  .ptop { position: absolute; z-index: 3; top: 20px; left: 50%; transform: translateX(-50%);
          width: min(82%, 260px); }
  select {
    width: 100%; text-align: center; text-align-last: center;
    border: 1px solid rgba(255,255,255,0.28); background: rgba(20,24,38,0.25);
    backdrop-filter: blur(12px); color: #fff; font-size: 14px; font-weight: 600;
    padding: 11px 14px; border-radius: 13px; outline: none; cursor: pointer;
    box-shadow: 0 6px 22px rgba(0,0,0,0.22);
    -webkit-appearance: none; appearance: none; transition: border-color .3s;
  }
  select:hover { border-color: rgba(255,255,255,0.55); }
  select option, optgroup { color: #1a1a1a; background: #f4f4f6; }

  /* 中央: 地名・時刻・明るさ */
  .pinfo { position: absolute; z-index: 3; left: 0; right: 0; top: 50%;
           transform: translateY(-50%); text-align: center; pointer-events: none;
           text-shadow: 0 2px 18px rgba(0,0,0,0.4); }
  .pname { font-size: 22px; font-weight: 700; letter-spacing: .05em; opacity: .95; }
  .ptime { font-size: 58px; font-weight: 200; line-height: 1.02; margin: 6px 0 4px;
           font-variant-numeric: tabular-nums; }
  .plux  { font-size: 14px; opacity: .9; letter-spacing: .02em; }
  .pphase{ font-size: 13px; opacity: .72; margin-top: 2px; }

  /* 下部中央: 時刻コントロール */
  #dock { position: fixed; z-index: 10; bottom: 30px; left: 50%; transform: translateX(-50%);
          display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-radius: 18px;
          background: rgba(16,18,30,0.42); border: 1px solid rgba(255,255,255,0.18);
          backdrop-filter: blur(18px); box-shadow: 0 14px 46px rgba(0,0,0,0.4);
          width: min(94vw, 600px); flex-wrap: wrap; justify-content: center; }
  #datep { border: 1px solid rgba(255,255,255,0.28); border-radius: 12px;
           background: rgba(255,255,255,0.12); color: #fff; font-size: 13px; font-weight: 600;
           padding: 9px 11px; outline: none; cursor: pointer; color-scheme: dark; }
  #datep::-webkit-calendar-picker-indicator { filter: invert(1); opacity: .8; cursor: pointer; }
  #mode { border: 1px solid rgba(255,255,255,0.35); border-radius: 12px; cursor: pointer; white-space: nowrap;
          font-size: 13px; font-weight: 700; color: #fff; padding: 10px 13px;
          background: rgba(255,255,255,0.12); transition: all .25s; }
  #mode:hover { background: rgba(255,255,255,0.22); }
  #mode:active { transform: scale(.95); }
  /* スライダー（数直線）: 常に表示 */
  #slider { flex: 1; min-width: 120px; -webkit-appearance: none; appearance: none; height: 5px;
            border-radius: 5px; outline: none;
            background: linear-gradient(90deg, rgba(30,40,90,.9), rgba(120,150,220,.9),
                        rgba(255,200,140,.95), rgba(120,90,150,.9), rgba(20,24,50,.95)); }
  #slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, #dfe4ef);
    box-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 0 4px rgba(255,255,255,0.14); cursor: pointer; }
  #slider::-moz-range-thumb { width: 22px; height: 22px; border: none; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, #dfe4ef);
    box-shadow: 0 2px 8px rgba(0,0,0,0.5); cursor: pointer; }
  /* 時刻表示（タップでホイールを開く） */
  #clock { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums;
           min-width: 78px; text-align: center; white-space: nowrap; cursor: pointer;
           color: #fff; padding: 8px 12px; border-radius: 11px;
           border: 1px solid rgba(255,255,255,0.30); background: rgba(255,255,255,0.12);
           transition: all .22s; }
  #clock:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.5); }
  #clock:active { transform: scale(.96); }
  #clock small { opacity: .6; font-size: 11px; font-weight: 400; }

  /* ホイール時刻ピッカー */
  #tpick { position: fixed; inset: 0; z-index: 30; display: flex; align-items: flex-end;
           justify-content: center; background: rgba(0,0,0,0.42); backdrop-filter: blur(3px); }
  #tpick.hidden { display: none; }
  .tp-card { background: rgba(20,22,34,0.94); border: 1px solid rgba(255,255,255,0.14);
             border-radius: 22px 22px 0 0; padding: 12px 20px 26px; width: min(100vw, 440px);
             box-shadow: 0 -12px 50px rgba(0,0,0,0.5); }
  .tp-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .tp-head span { font-size: 13px; opacity: .7; letter-spacing: .05em; }
  .tp-head button { background: none; border: none; font-size: 16px; font-weight: 700;
                    cursor: pointer; padding: 8px 6px; }
  #tpNow { color: #9cc4ff; }
  #tpDone { color: #ffd27a; }
  .tp-wheels { position: relative; display: flex; align-items: center; justify-content: center;
               gap: 4px; height: 200px; }
  .tp-colon { font-size: 26px; font-weight: 600; opacity: .55; padding-bottom: 3px; }
  .tp-unit { font-size: 13px; opacity: .5; align-self: center; margin: 0 2px 0 -2px; }
  .wheel { height: 200px; width: 84px; overflow-y: scroll; scroll-snap-type: y mandatory;
           -webkit-mask: linear-gradient(180deg,transparent,#000 30%,#000 70%,transparent);
           mask: linear-gradient(180deg,transparent,#000 30%,#000 70%,transparent);
           scrollbar-width: none; }
  .wheel::-webkit-scrollbar { display: none; }
  .witem { height: 40px; display: flex; align-items: center; justify-content: center;
           font-size: 27px; font-weight: 500; font-variant-numeric: tabular-nums;
           scroll-snap-align: center; transition: opacity .12s, transform .12s; }
  .tp-pill { position: absolute; left: 8px; right: 8px; top: 80px; height: 40px; border-radius: 12px;
             background: rgba(255,255,255,0.10); pointer-events: none; }

  /* アプリ名 */
  #appname { position: fixed; z-index: 20; top: 18px; left: 22px; pointer-events: none;
             font-size: 20px; font-weight: 800; letter-spacing: .12em;
             text-shadow: 0 2px 12px rgba(0,0,0,0.45); opacity: .95; }

  /* スマホ（縦長画面）: 上下2分割。ドックは重ねず最下部に置く */
  @media (orientation: portrait) {
    body { display: flex; flex-direction: column; height: 100dvh; }
    #stage { flex: 1 1 auto; min-height: 0; width: 100%; height: auto; flex-direction: column; }
    .panel + .panel { box-shadow: 0 -1px 0 rgba(255,255,255,0.16); }
    .ptime { font-size: 44px; }
    .pname { font-size: 18px; }
    .ptop { top: 12px; width: min(88%, 240px); }
    #appname { font-size: 16px; top: 11px; left: 14px; z-index: 25; }
    /* ドックを通常フロー化して画面下に固定表示せず並べる */
    #dock { position: static; transform: none; left: auto; bottom: auto;
            flex: 0 0 auto; width: 100%; max-width: none; border-radius: 18px 18px 0 0;
            padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>
  <div id="appname">いま空</div>
  <div id="stage">
    <div class="panel" data-i="0">
      <div class="ptop"><select></select></div>
      <div class="pinfo"><div class="pname"></div><div class="ptime"></div>
        <div class="plux"></div><div class="pphase"></div></div>
    </div>
    <div class="panel" data-i="1">
      <div class="ptop"><select></select></div>
      <div class="pinfo"><div class="pname"></div><div class="ptime"></div>
        <div class="plux"></div><div class="pphase"></div></div>
    </div>
  </div>

  <div id="dock">
    <button id="mode">⇆ 比較</button>
    <input id="datep" type="date">
    <input id="slider" type="range" min="0" max="1439" step="1" value="720">
    <button id="clock" title="タップで時刻をホイールで選ぶ">現在</button>
  </div>

  <div id="tpick" class="hidden">
    <div class="tp-card">
      <div class="tp-head">
        <button id="tpNow">現在</button>
        <span>時刻をえらぶ</span>
        <button id="tpDone">決定</button>
      </div>
      <div class="tp-wheels">
        <div class="wheel" id="wheelH"></div>
        <div class="tp-unit">時</div>
        <div class="tp-colon">:</div>
        <div class="wheel" id="wheelM"></div>
        <div class="tp-unit">分</div>
        <div class="tp-pill"></div>
      </div>
    </div>
  </div>

<script>
"use strict";
const RAD = Math.PI / 180;
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const lerp = (a,b,t) => a + (b-a)*t;

/* ===== 太陽高度（緯度・経度・時刻から） ===== */
function jdays(date){ return date.getTime()/86400000 + 2440587.5 - 2451545.0; }
function sunElevation(date, lat, lon){
  const d = jdays(date);
  const g = (357.529 + 0.98560028*d)*RAD;
  const q = 280.459 + 0.98564736*d;
  const L = q + 1.915*Math.sin(g) + 0.020*Math.sin(2*g);
  const Lr = L*RAD, e = (23.439 - 0.00000036*d)*RAD;
  const ra = Math.atan2(Math.cos(e)*Math.sin(Lr), Math.cos(Lr)) / RAD;
  const dec = Math.asin(Math.sin(e)*Math.sin(Lr)) / RAD;
  const gmst = (280.46061837 + 360.98564736629*d) % 360;
  const H = (((gmst + lon - ra) % 360)) * RAD;
  const dr = dec*RAD, lr = lat*RAD;
  return Math.asin(Math.sin(lr)*Math.sin(dr) + Math.cos(lr)*Math.cos(dr)*Math.cos(H)) / RAD;
}
/* 大気差（見かけの高度）と照度・明るさ */
function refract(h){ if(h < -1) return h; return h + (1/Math.tan((h + 7.31/(h+4.4))*RAD))/60; }
const TWILIGHT=[[3,3.65],[0,2.60],[-6,0.53],[-12,-2.10],[-18,-3.22]];
const L_MIN=-3.22, L_MAX=Math.log10(133800);
function log10Ill(h){
  if(h>=3) return Math.log10(133800*Math.pow(Math.sin(Math.max(h,0.5)*RAD),1.15));
  if(h<=-18) return L_MIN;
  for(let i=0;i<TWILIGHT.length-1;i++){ const [h1,e1]=TWILIGHT[i], [h2,e2]=TWILIGHT[i+1];
    if(h<=h1 && h>=h2) return e1+(e2-e1)*((h-h1)/(h2-h1)); }
  return L_MIN;
}
const brightness = h => clamp((log10Ill(h)-L_MIN)/(L_MAX-L_MIN),0,1);

/* ===== 空の色（色相と明るさを分離して合成） ===== */
const SKY_STOPS=[
  [-18,[0.06,0.10,0.30],[0.09,0.13,0.34],'夜'],
  [-12,[0.10,0.16,0.42],[0.20,0.22,0.50],'天文薄明'],
  [-8, [0.20,0.28,0.62],[0.48,0.36,0.66],'航海薄明'],
  [-4, [0.35,0.40,0.75],[1.00,0.52,0.46],'市民薄明'],
  [0,  [0.45,0.55,0.86],[1.00,0.62,0.35],'日の出/日の入り'],
  [3,  [0.45,0.63,0.96],[1.00,0.78,0.55],'ゴールデンアワー'],
  [10, [0.42,0.66,0.98],[0.75,0.86,1.00],'朝夕'],
  [30, [0.30,0.55,1.00],[0.60,0.80,1.00],'昼'],
  [60, [0.26,0.50,1.00],[0.55,0.75,1.00],'真昼'],
];
function skyTint(h){
  const S=SKY_STOPS; let lo=S[0], hi=S[S.length-1];
  if(h<=S[0][0]) return {top:S[0][1], bottom:S[0][2], phase:S[0][3]};
  if(h>=hi[0]) return {top:hi[1], bottom:hi[2], phase:hi[3]};
  for(let i=0;i<S.length-1;i++){ if(h>=S[i][0]&&h<S[i+1][0]){lo=S[i];hi=S[i+1];break;} }
  const t=(h-lo[0])/(hi[0]-lo[0]);
  const mix=(a,b)=>[lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t)];
  return {top:mix(lo[1],hi[1]), bottom:mix(lo[2],hi[2]), phase: t<0.5?lo[3]:hi[3]};
}
const AMBIENT=[5,7,18];
function skyColors(h){
  const tint=skyTint(h), B=brightness(h);
  const ap=c=>[AMBIENT[0]+c[0]*B*255, AMBIENT[1]+c[1]*B*255, AMBIENT[2]+c[2]*B*255];
  return {top:ap(tint.top), bottom:ap(tint.bottom), phase:tint.phase, B, lux:Math.pow(10,log10Ill(h))};
}
const css = c => `rgb(${clamp(c[0]|0,0,255)},${clamp(c[1]|0,0,255)},${clamp(c[2]|0,0,255)})`;

/* ===== 都市データ ===== */
const WORLD=[
  ['ニューヨーク',40.7128,-74.0060,'America/New_York'],['ロサンゼルス',34.0522,-118.2437,'America/Los_Angeles'],
  ['ロンドン',51.5074,-0.1278,'Europe/London'],['パリ',48.8566,2.3522,'Europe/Paris'],
  ['ローマ',41.9028,12.4964,'Europe/Rome'],['ベルリン',52.5200,13.4050,'Europe/Berlin'],
  ['モスクワ',55.7558,37.6173,'Europe/Moscow'],['カイロ',30.0444,31.2357,'Africa/Cairo'],
  ['ドバイ',25.2048,55.2708,'Asia/Dubai'],['ムンバイ',19.0760,72.8777,'Asia/Kolkata'],
  ['バンコク',13.7563,100.5018,'Asia/Bangkok'],['シンガポール',1.3521,103.8198,'Asia/Singapore'],
  ['北京',39.9042,116.4074,'Asia/Shanghai'],['ソウル',37.5665,126.9780,'Asia/Seoul'],
  ['シドニー',-33.8688,151.2093,'Australia/Sydney'],['オークランド',-36.8485,174.7633,'Pacific/Auckland'],
  ['ホノルル',21.3069,-157.8583,'Pacific/Honolulu'],['サンパウロ',-23.5505,-46.6333,'America/Sao_Paulo'],
  ['レイキャビク',64.1466,-21.9426,'Atlantic/Reykjavik'],['ケープタウン',-33.9249,18.4241,'Africa/Johannesburg'],
];
const PREF=[
  ['北海道（札幌）',43.0642,141.3469],['青森',40.8244,140.7400],['岩手（盛岡）',39.7036,141.1527],
  ['宮城（仙台）',38.2688,140.8721],['秋田',39.7186,140.1024],['山形',38.2404,140.3633],
  ['福島',37.7500,140.4676],['茨城（水戸）',36.3418,140.4468],['栃木（宇都宮）',36.5657,139.8836],
  ['群馬（前橋）',36.3912,139.0608],['埼玉（さいたま）',35.8570,139.6489],['千葉',35.6047,140.1233],
  ['東京',35.6895,139.6917],['神奈川（横浜）',35.4478,139.6425],['新潟',37.9026,139.0236],
  ['富山',36.6953,137.2114],['石川（金沢）',36.5947,136.6256],['福井',36.0652,136.2216],
  ['山梨（甲府）',35.6642,138.5684],['長野',36.6513,138.1810],['岐阜',35.3912,136.7223],
  ['静岡',34.9769,138.3831],['愛知（名古屋）',35.1802,136.9066],['三重（津）',34.7303,136.5086],
  ['滋賀（大津）',35.0045,135.8686],['京都',35.0116,135.7681],['大阪',34.6937,135.5023],
  ['兵庫（神戸）',34.6913,135.1830],['奈良',34.6851,135.8048],['和歌山',34.2260,135.1675],
  ['鳥取',35.5036,134.2383],['島根（松江）',35.4723,133.0505],['岡山',34.6618,133.9350],
  ['広島',34.3853,132.4553],['山口',34.1859,131.4706],['徳島',34.0658,134.5593],
  ['香川（高松）',34.3401,134.0434],['愛媛（松山）',33.8416,132.7657],['高知',33.5597,133.5311],
  ['福岡',33.6064,130.4181],['佐賀',33.2494,130.2988],['長崎',32.7448,129.8737],
  ['熊本',32.7898,130.7417],['大分',33.2382,131.6126],['宮崎',31.9111,131.4239],
  ['鹿児島',31.5602,130.5581],['沖縄（那覇）',26.2124,127.6809],
];
function cityFromValue(v){
  const [g,i]=v.split(':'); const idx=+i;
  if(g==='w'){ const c=WORLD[idx]; return {name:c[0],lat:c[1],lon:c[2],tz:c[3]}; }
  const c=PREF[idx]; return {name:c[0],lat:c[1],lon:c[2],tz:'Asia/Tokyo'};
}
function buildSelect(sel, value){
  const g1=document.createElement('optgroup'); g1.label='🌍 世界の都市';
  WORLD.forEach((c,i)=>{ const o=document.createElement('option'); o.value='w:'+i; o.textContent=c[0]; g1.appendChild(o); });
  const g2=document.createElement('optgroup'); g2.label='🗾 都道府県';
  PREF.forEach((c,i)=>{ const o=document.createElement('option'); o.value='p:'+i; o.textContent=c[0]; g2.appendChild(o); });
  sel.appendChild(g1); sel.appendChild(g2); sel.value=value;
}

/* ===== タイムゾーン ===== */
// tz上の指定日(ymd={y,mo,dd}; 省略時は今日) minutes分の壁時計時刻→実時刻
function zonedWallToDate(tz, minutes, ymd){
  const dtf=new Intl.DateTimeFormat('en-US',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  let y,mo,dd;
  if(ymd){ y=ymd.y; mo=ymd.mo; dd=ymd.dd; }
  else { const np={}; dtf.formatToParts(new Date()).forEach(p=>np[p.type]=p.value); y=+np.year; mo=+np.month; dd=+np.day; }
  const h=Math.floor(minutes/60), mi=minutes%60;
  const wallUTC=Date.UTC(y,mo-1,dd,h,mi);
  const off=ms=>{const m={};dtf.formatToParts(new Date(ms)).forEach(p=>m[p.type]=p.value);let hh=m.hour==='24'?0:+m.hour;return Date.UTC(+m.year,+m.month-1,+m.day,hh,+m.minute,+m.second)-ms;};
  let r=wallUTC-off(wallUTC); r=wallUTC-off(r); return new Date(r);
}
const localTimeStr=(date,tz)=> new Intl.DateTimeFormat('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:tz}).format(date);
const todayYMDStr=tz=> new Intl.DateTimeFormat('en-CA',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());
function parseYMD(s){ const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(s||''); return m?{y:+m[1],mo:+m[2],dd:+m[3]}:null; }

/* ===== パネル ===== */
const panels=[...document.querySelectorAll('.panel')].map(el=>({
  el, sel: el.querySelector('select'),
  name: el.querySelector('.pname'), time: el.querySelector('.ptime'),
  lux: el.querySelector('.plux'), phase: el.querySelector('.pphase'),
  city: null,
}));

function renderPanel(p, date){
  if(!p.city) return;
  const h = refract(sunElevation(date, p.city.lat, p.city.lon));
  const sky = skyColors(h);
  p.el.style.background = `linear-gradient(to bottom, ${css(sky.top)} 0%, ${css(sky.bottom)} 100%)`;
  p.name.textContent = p.city.name;
  p.time.textContent = localTimeStr(date, p.city.tz);
  const lx = sky.lux>=100?Math.round(sky.lux).toLocaleString():sky.lux>=1?sky.lux.toFixed(1):sky.lux.toFixed(3);
  p.lux.textContent = `約 ${lx} lux`;
  p.phase.textContent = `${sky.phase}・高度 ${h.toFixed(1)}°`;
}

/* ===== モード（1都市 / 比較）===== */
const stage=document.getElementById('stage'), modeBtn=document.getElementById('mode');
let compare=false;
function applyMode(){
  stage.classList.toggle('single', !compare);
  modeBtn.textContent = compare ? '◻ 1都市' : '⇆ 比較';
}
modeBtn.addEventListener('click', ()=>{ compare=!compare; applyMode(); renderAll(); });

/* ===== 時刻コントロール（スライダー＋時刻タップでホイール） ===== */
let liveMode=true, clockTimer=null, selMin=720;
const dateEl=document.getElementById('datep');
const slider=document.getElementById('slider'), clockEl=document.getElementById('clock');
const tpick=document.getElementById('tpick'), tpNow=document.getElementById('tpNow'), tpDone=document.getElementById('tpDone');

function currentDate(){
  if(liveMode) return new Date();
  return zonedWallToDate(panels[0].city.tz, selMin, parseYMD(dateEl.value));
}
function renderAll(){ const d=currentDate(); panels.forEach(p=>renderPanel(p,d)); }
function ensureTimer(){ if(clockTimer) clearInterval(clockTimer); if(liveMode) clockTimer=setInterval(renderAll,1000); }
function hhmm(m){ return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }
// スライダー右の時刻表示に反映
function syncControls(){
  clockEl.innerHTML = liveMode ? '現在' : hhmm(selMin);
  slider.value = selMin;
}
function setLive(){ liveMode=true; dateEl.value=todayYMDStr(panels[0].city.tz); syncControls(); renderAll(); ensureTimer(); }
function enterManual(){ liveMode=false; if(clockTimer) clearInterval(clockTimer); }

// スライダー操作
slider.addEventListener('input', ()=>{ enterManual(); selMin=+slider.value; syncControls(); renderAll(); });

/* --- ホイール部品 --- */
const ITEM_H=40;
function makeWheel(el, count, onSettle){
  el.innerHTML='';
  const list=document.createElement('div');
  const spacer=()=>{ const s=document.createElement('div'); s.style.height=(ITEM_H*2)+'px'; return s; };
  list.appendChild(spacer());
  for(let i=0;i<count;i++){ const d=document.createElement('div'); d.className='witem'; d.textContent=String(i).padStart(2,'0'); list.appendChild(d); }
  list.appendChild(spacer());
  el.appendChild(list);
  const items=[...list.querySelectorAll('.witem')];
  function paint(){
    const idx=el.scrollTop/ITEM_H;
    items.forEach((it,i)=>{ const dist=Math.abs(i-idx);
      it.style.opacity=Math.max(0.12,1-dist*0.26);
      it.style.transform=`scale(${Math.max(0.65,1-dist*0.13)})`; });
  }
  let t, controller={ get index(){ return clamp(Math.round(el.scrollTop/ITEM_H),0,count-1); },
    set index(i){ el.scrollTop=clamp(i,0,count-1)*ITEM_H; paint(); } };
  el.addEventListener('scroll', ()=>{ paint(); clearTimeout(t);
    t=setTimeout(()=>{ const idx=controller.index; el.scrollTo({top:idx*ITEM_H,behavior:'smooth'}); onSettle(idx); }, 110); });
  controller.repaint=paint;
  return controller;
}
const wheelH=makeWheel(document.getElementById('wheelH'), 24, ()=>applyWheel());
const wheelM=makeWheel(document.getElementById('wheelM'), 60, ()=>applyWheel());
function applyWheel(){ enterManual(); selMin=wheelH.index*60+wheelM.index; syncControls(); renderAll(); }

function openPicker(){
  // 開始値: 手動ならselMin、現在なら対象都市の今の時刻
  let base=selMin;
  if(liveMode){ const s=localTimeStr(new Date(), panels[0].city.tz); const mm=/(\d{2}):(\d{2})/.exec(s); if(mm) base=+mm[1]*60+ +mm[2]; }
  tpick.classList.remove('hidden');
  requestAnimationFrame(()=>{ wheelH.index=Math.floor(base/60); wheelM.index=base%60; });
}
function closePicker(){ tpick.classList.add('hidden'); }
clockEl.addEventListener('click', openPicker);
tpDone.addEventListener('click', closePicker);
tpNow.addEventListener('click', ()=>{ setLive(); closePicker(); });
tpick.addEventListener('click', e=>{ if(e.target===tpick) closePicker(); });

dateEl.addEventListener('change', ()=>{
  // 日付を選んだら手動モードへ（「現在」だった場合は12:00に）
  if(liveMode){ enterManual(); selMin=720; }
  syncControls(); renderAll();
});

/* ===== 初期化 ===== */
function initPanel(p, value){
  buildSelect(p.sel, value);
  p.city=cityFromValue(value);
  p.sel.addEventListener('change', ()=>{ p.city=cityFromValue(p.sel.value); renderAll(); });
}
initPanel(panels[0], 'p:0');   // 札幌
initPanel(panels[1], 'p:46');  // 那覇
applyMode();
setLive();
</script>
</body>
